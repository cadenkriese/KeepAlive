name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
          cache: 'gradle'
      - run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          archive: false
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
